<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Tarefas Premium</title>
    <link rel="stylesheet" href="style.css">
    <!-- Fonte moderna do Google -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Ícones -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Minhas Tarefas</h1>
            <p>Gerenciamento Diário</p>
            <div id="relogioContainer" class="relogio">--:--:--</div>
        </header>

        <!-- READ, UPDATE, DELETE: Lista onde as tarefas aparecerão -->
        <div id="daysContainer" class="days-container">
            <!-- Os blocos de cada dia serão injetados aqui pelo JavaScript -->
        </div>
    </div>

    <!-- Polyfill para Drag and Drop no Mobile -->
    <script src="https://cdn.jsdelivr.net/npm/mobile-drag-drop@2.3.0-beta.2/index.min.js"></script>
    <script>
        // Inicializa o Polyfill para telas de toque
        MobileDragDrop.polyfill({
            dragImageTranslateOverride: MobileDragDrop.scrollBehaviourDragImageTranslateOverride
        });

        // Bloqueia a rolagem da tela no mobile enquanto está arrastando
        window.addEventListener('touchmove', function(e) {
            if (document.querySelector('.dragging')) {
                e.preventDefault();
            }
        }, { passive: false });
    </script>

    <!-- Configurações secretas (não vai pro GitHub) -->
    <script src="config.js"></script>
    <!-- Nosso "Banco de Dados" e Lógica -->
    <script src="app.js"></script>
</body>
</html>
